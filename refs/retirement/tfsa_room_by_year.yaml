# Annual TFSA Contribution Room by Calendar Year
# Source: CRA — https://www.canada.ca/en/revenue-agency/services/tax/individuals/topics/tax-free-savings-account/contributions.html
# Last updated: 2026
#
# Rules:
#   - TFSA program started January 1, 2009.
#   - Eligibility: Canadian resident, 18+ years old, valid SIN.
#   - Unused room carries forward indefinitely.
#   - Withdrawals restore room on January 1 of the following year.
#   - Amounts are indexed to inflation in $500 increments starting 2010.
#
# To compute cumulative room: sum all years from max(2009, year_turned_18) to current year,
# then subtract total contributions made and add back prior-year withdrawals.
# The profile stores "tfsa_room_remaining" which already reflects the investor's actual room.
#
# The annual_limit here is the new room added each year (before any personal adjustments).

annual_limit:
  2009: 5000
  2010: 5000
  2011: 5000
  2012: 5000
  2013: 5500
  2014: 5500
  2015: 10000   # temporary increase, then reversed
  2016: 5500
  2017: 5500
  2018: 5500
  2019: 6000
  2020: 6000
  2021: 6000
  2022: 6000
  2023: 6500
  2024: 7000
  2025: 7000
  2026: 7000    # indexed; confirm each January from CRA

# Cumulative room if eligible since 2009 (for reference):
# Through 2026: $102,000 total
cumulative_through_2026: 102000
