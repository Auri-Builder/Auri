# CRA Prescribed RRIF Minimum Withdrawal Percentages by Age
# Source: Income Tax Act, Schedule III (subsection 146.3(1))
# Last verified: 2025. Update if CRA changes the table.
#
# Rules:
#   - RRSP must convert to RRIF by Dec 31 of the year the owner turns 71.
#   - First RRIF withdrawal is required in the year after conversion (age 72+).
#   - Minimum % applies to the RRIF balance at January 1 of that year.
#   - A spouse/common-law partner's age can be used if lower (reduces minimums).
#   - No maximum withdrawal — only a floor.
#
# Key planning note: at age 72+ the minimums can force more withdrawal than
# needed for spending — the excess lands in a taxable account. Plan early.

